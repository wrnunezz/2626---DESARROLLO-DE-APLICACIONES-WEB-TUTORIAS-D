<head>

<body>
   <h1>FERRETERIA EL CONSTRUCTOR</h1>
   <div class="row">
    <div class="col-12 bg-primary text-white p-3">Columna 12</div>
    <div class="col-6 bg-secondary text-white p-3">Columna 6</div>
    <div class="col-6 bg-success text-white p-3">Columna 6</div>
    <div class="col-4 bg-danger text-white p-3">Columna 4</div>
    <div class="col-4 bg-warning text-white p-3">Columna 4</div>
    <div class="col-4 bg-info text-white p-3">Columna 4</div>
   </div>
<!-- colores q usa boostrap -->
 <div class="bg-primary text-white p-2">Primary (Azul)</div>

<div class="bg-secondary text-white p-2">Secondary (Gris)</div>

<div class="bg-success text-white p-2">Success (Verde)</div>

<div class="bg-danger text-white p-2">Danger (Rojo)</div>

<div class="bg-warning p-2">Warning (Amarillo)</div>

<div class="bg-info p-2">Info (Celeste)</div>

<div class="bg-dark text-white p-2">Dark (Negro)</div>

<div class="bg-light p-2">Light (Blanco/Gris claro)</div>


   <button class="btn btn-primary">Boton Primario</button>
    <button class="btn btn-secondary">Boton Secundario</button>
    <button class="btn btn-success">Boton Exitoso</button>
    <button class="btn btn-danger">Boton Peligro</button>   
    <button class="btn btn-warning">Boton Advertencia</button>
    <button class="btn btn-info">Boton Informativo</button>
    <button class="btn btn-light">Boton Claro</button>
    <button class="btn btn-dark">Boton Oscuro</button>  
    <button class="btn btn-link">Boton Enlace</button>

<button type="button" class="btn btn-outline-primary btn-sm">Primary</button>
<button type="button" class="btn btn-outline-secondary">Secondary</button>
<button type="button" class="btn btn-outline-success">Success</button>
<button type="button" class="btn btn-outline-danger">Danger</button>
<button type="button" class="btn btn-outline-warning">Warning</button>
<button type="button" class="btn btn-outline-info">Info</button>
<button type="button" class="btn btn-outline-light">Light</button>
<button type="button" class="btn btn-outline-dark">Dark</button>

<button type="button" class="btn-close" aria-label="Close"></button>
    
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
